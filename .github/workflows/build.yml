name: Build

on:
  schedule:
    # Her gun saat 20:00 Turkiye saati (UTC+3 = 17:00 UTC)
    - cron: "0 17 * * *"
  workflow_dispatch:
    description: Elle derleme baslatma

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gpui_app-linux-x64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: gpui_app-linux-arm64

          # ── macOS ────────────────────────────────────────
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: gpui_app-macos-arm64

          # ── Windows ────────────────────────────────────
          - name: Windows x86
            os: windows-latest
            target: i686-pc-windows-msvc
            artifact: gpui_app-windows-x86
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gpui_app-windows-x64
          - name: Windows ARM64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: gpui_app-windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain kur
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Linux bagimliliklari ──
      - name: Linux bagimliliklar
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libvulkan-dev \
            libwayland-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      # ── Derleme ──
      - name: Derle
        run: cargo build --release --target ${{ matrix.target }}

      # ── Dosyayi paketle ──
      - name: Paketle (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ github.workspace }}/${{ matrix.artifact }}.tar.gz gpui_app

      - name: Paketle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/gpui_app.exe -DestinationPath ${{ matrix.artifact }}.zip

      # ── Artifact yukle (release adimi icin) ──
      - name: Artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: warn

  # ── Release olustur ──
  release:
    name: Release olustur
    runs-on: ubuntu-latest
    needs: build
    if: success()
    permissions:
      contents: write
      actions: write
    steps:
      - name: Artifact'lari indir
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Dosyalari listele
        run: find artifacts -type f | sort

      - name: Tarih etiketi olustur
        id: tag
        run: echo "tag=build-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: GitHub Release olustur
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          DATE=$(date -u +'%d.%m.%Y %H:%M UTC')

          gh release create "$TAG" \
            --title "Build $DATE" \
            --notes "Otomatik derleme - $DATE" \
            --latest \
            artifacts/*

      # ── Eski release'leri temizle (son 3 kalsin) ──
      - name: Eski release'leri sil
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release list --json tagName -q '.[].tagName' \
          | grep '^build-' \
          | tail -n +4 \
          | while read -r tag; do
              echo "Siliniyor: $tag"
              gh release delete "$tag" --yes --cleanup-tag || true
            done

  # ── Eski workflow run'lari temizle (son 3 basarili kalsin) ──
  cleanup:
    name: Eski derlemeleri temizle
    runs-on: ubuntu-latest
    needs: release
    if: success()
    permissions:
      actions: write
    steps:
      - name: Son 3 basarili disindakileri sil
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run list \
            --workflow build.yml \
            --status success \
            --json databaseId \
            --limit 100 \
            -q '.[].databaseId' \
          | tail -n +4 \
          | while read -r run_id; do
              echo "Siliniyor: run #$run_id"
              gh run delete "$run_id" || true
            done
